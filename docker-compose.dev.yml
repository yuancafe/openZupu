# Local development override — uses PostgreSQL to match production schema
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Or just `docker compose -f docker-compose.dev.yml up postgres` for DB only

services:
  postgres:
    image: postgres:16-alpine
    container_name: openzupu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openzupu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: